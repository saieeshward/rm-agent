# Fly.io config for the Revenue Manager Agent.
#   fly launch --no-deploy --copy-config   # if the app name is taken, edit below
#   fly postgres create --name otel-rm-db  # provision managed Postgres
#   fly postgres attach otel-rm-db         # sets DATABASE_URL secret on the app
#   fly secrets set MODEL=... OPENROUTER_API_KEY=... BASIC_AUTH_USER=gm BASIC_AUTH_PASS=...
#   ./scripts/init_db.sh                   # load schema + data + views into the hosted DB
#   fly deploy
app = "otel-rm-agent"
primary_region = "lhr"   # London; change to a region near you

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # keep it up for the 7-day live window
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
