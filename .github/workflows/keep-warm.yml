name: keep-warm

# Free cold-boot mitigation: ping the unauthenticated /health endpoint on a
# schedule so the Render free instance never spins down (and Neon stays awake,
# since /health runs a real DB query). GitHub-hosted, $0, no external service.
# Note: scheduled runs can be delayed several minutes under GitHub load; a 5-min
# cadence leaves margin under Render's ~15-min idle-to-sleep threshold even if a
# run is skipped/delayed. Repo is public, so Actions minutes are free/unlimited.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (retry through a possible cold boot)
        run: |
          url="https://otel-rm-agent.onrender.com/health"
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$url") || code=000
            if [ "$code" = "200" ]; then echo "warm (HTTP $code)"; exit 0; fi
            echo "attempt $i: HTTP $code — retrying in 30s"; sleep 30
          done
          echo "::warning::/health did not return 200 after 3 attempts"
